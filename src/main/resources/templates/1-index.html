<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC cafe</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 400px;
        background: white;
        padding: 20px;
        min-height: 100vh;
    }

    h2 {
        margin-bottom: 10px;
    }

    /* Category Buttons */
    .categories {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        white-space: nowrap;
        margin-bottom: 20px;
    }

    .category-btn {
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid #ccc;
        background: #eee;
        cursor: pointer;
        font-size: 14px;
    }

    .category-btn.active {
        background: black;
        color: white;
        border: none;
    }

    /* Product Grid */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .menu-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        padding-bottom: 10px;
    }

    .menu-card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
    }

    .menu-info {
        padding: 10px;
    }

    .menu-name {
        font-size: 14px;
        margin-bottom: 5px;
    }

    .menu-price {
        font-weight: bold;
    }

</style>
</head>
<body>

<div class="container">

    <h2>Categories</h2>

    <div class="categories">
        <a href="/?category=cold"
       class="category-btn"
       th:classappend="${selectedCategory=='cold'} ? ' active'">
       Cold drink
    </a>

    <a href="/?category=hot"
       class="category-btn"
       th:classappend="${selectedCategory=='hot'} ? ' active'">
       Hot drink
    </a>

    <a href="/?category=dessert"
       class="category-btn"
       th:classappend="${selectedCategory=='dessert'} ? ' active'">
       Dessert
    </a>
    </div>



    <div class="menu-grid">
         //th:if="${menus != null}">// 

    <div th:each="p : ${menus}"
         th:replace="fragments/menu-card :: menuCard(
            ${p.name},
            ${p.price},
            ${p.imageUrl}
         )">
    </div>

</div>

</div>

</body>
</html>
