<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Order</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="order-container">

    <h1 class="order-title">My Order</h1>

    <!-- ตะกร้าว่าง -->
    <div th:if="${cart.totalItems == 0}" class="empty-cart">
        <p>Your cart is empty.</p>
        <a th:href="@{/}" class="back-btn">Back to Menu</a>
    </div>

    <!-- มีสินค้า -->
    <div th:if="${cart.totalItems > 0}">

        <div class="order-card">

            <div class="order-item" th:each="item : ${cart.items}">
                
                <div class="item-info">
                    <h3 th:text="${item.menuItem.name}"></h3>

                    <p class="sub-text">
                        Qty: <span th:text="${item.quantity}"></span>
                    </p>

                    <p class="sub-text" th:if="${item.sweetness != null}">
                        Sweetness: <span th:text="${item.sweetness}"></span>
                    </p>

                    <p class="sub-text" th:if="${item.note != null}">
                        Note: <span th:text="${item.note}"></span>
                    </p>
                </div>

                <div class="item-price">
                    ฿ <span th:text="${item.menuItem.price * item.quantity}"></span>
                </div>

            </div>

            <div class="divider"></div>

            <!-- รวมราคา -->
            <div class="order-summary">
                <h2>
                    Total: ฿ <span th:text="${cart.totalPrice}"></span>
                </h2>
            </div>

        </div>

        <div class="order-actions">
            <a th:href="@{/}" class="close-btn">Cancel</a>
            <button class="confirm-btn">Order Now</button>
        </div>

    </div>

</div>

</body>
</html>
