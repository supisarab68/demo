<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC cafe</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f3ef;
            margin: 0;
            color: #646C51;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px 120px;
        }

        /* ===== HEADER ===== */
        h1 {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* ===== FILTER ===== */
        .filter-group {
            margin-bottom: 30px;
        }

        .filter-btn {
            background: transparent;
            border: none;
            font-size: 14px;
            margin-right: 18px;
            cursor: pointer;
            color: #646C51;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .filter-btn:hover {
            color: #6f4e37;
            font-weight: 600;
        }

        .filter-btn.active {
            background-color: #d0c9b5;
            color: #646C51;
            font-weight: 500;
        }

        /* ===== GRID ===== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* ===== CARD ===== */
        .menu-card {
            background: white;
            border-radius: 18px;
            padding: 20px;
            transition: 0.3s ease;
            text-decoration: none; /* เอาขีดเส้นใต้ลิงก์ออก */
            color: inherit;
        }

        .menu-card:hover {
            transform: translateY(-4px);
        }

        /* ===== IMAGE ===== */
        .menu-img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 15px;
        }

        /* ===== TEXT ===== */
        .menu-card h3 {
            font-size: 18px;
            font-weight: 500;
            margin: 8px 0;
        }

        .price {
            color: #6f4e37;
            font-weight: 600;
            margin-top: 6px;
        }

        /* ===== CHECKOUT BAR ===== */
        .checkout-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #e5e5e5;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box; /* ป้องกันไม่ให้แถบล้นจอ */
        }

        .checkout-bar .checkout-btn {
            background: #6f4e37;
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .checkout-bar .checkout-btn:hover {
            background: #5a3e2c;
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(1, 1fr);
                gap: 16px;
            }
            .menu-img {
                height: 140px;
            }
            h1 {
                font-size: 28px;
            }
            .container {
                padding: 20px 16px 120px;
            }
            .filter-group {
                display: flex;
                flex-wrap: nowrap;
                width: 100%;
                overflow-x: auto; /* ให้มือถือเลื่อนซ้ายขวาได้ */
            }
            .filter-btn {
                flex: 1 1 0;
                min-width: fit-content;
                margin: 0 4px;
                padding: 6px 12px;
                font-size: 14px;
                text-align: center;
                white-space: nowrap;
            }
            .checkout-bar {
                padding: 15px 20px;
            }
        }

        /* ================== CSS กล่องแจ้งเตือน (เพิ่มใหม่) ================== */
        .toast {
            position: fixed;
            bottom: 90px; /* ลอยสูง 90px เพื่อให้ข้ามแถบ Checkout Bar */
            left: 50%;
            transform: translateX(-50%);
            background-color: #6f4e37; /* สีน้ำตาลเข้ากับธีมร้าน */
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); /* เด้งดึ๋งๆ */
        }
        .toast.hidden {
            opacity: 0;
            bottom: 50px; 
            visibility: hidden;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>ABC cafe</h1>

    <div class="filter-group">
        <a th:href="@{/}"
           th:classappend="${selectedCategory == null} ? 'active' : ''"
           class="filter-btn">
            All
        </a>

        <a th:href="@{/?category=COLD_BEVERAGE}" 
           th:classappend="${selectedCategory?.name() == 'COLD_BEVERAGE'} ? 'active' : ''"
           class="filter-btn">
            Cold drink
        </a>

        <a th:href="@{/?category=HOT_BEVERAGE}" 
           th:classappend="${selectedCategory?.name() == 'HOT_BEVERAGE'} ? 'active' : ''"
           class="filter-btn">
            Hot drink
        </a>

        <a th:href="@{/?category=DESSERT}" 
           th:classappend="${selectedCategory?.name() == 'DESSERT'} ? 'active' : ''"
           class="filter-btn">
            Dessert
        </a>
    </div>

    <div class="menu-grid">
        <a th:each="menu : ${menus}"
           th:href="@{'/menu/' + ${menu.id}}"
           class="menu-card">

            <img th:src="@{${menu.image}}" 
                class="menu-img" 
                alt="item image">

            <h3 th:text="${menu.name}"></h3>
            <div class="price" th:text="'฿' + ${menu.price}"></div>
        </a>
    </div>

</div>

<div class="checkout-bar">
    <div>
        Items: <span th:text="${cartItems}"></span>
        |
        ฿ <span th:text="${cartTotal}"></span>
    </div>
    <a th:href="@{/my-order}" class="checkout-btn">
        Check Out
    </a>
</div>

<div id="toast-container" class="toast hidden"></div>

<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        const msg = sessionStorage.getItem('orderMessage');
        
        if (msg) {
            const toast = document.getElementById('toast-container');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
            
            sessionStorage.removeItem('orderMessage');
        }
    });
</script>

</body>
</html>
